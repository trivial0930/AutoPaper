name: Daily VLA/CV Papers

on:
  schedule:
    # 09:00 Asia/Shanghai.
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      days:
        description: "Lookback window in days"
        required: false
        default: "2"
      since_last_sunday:
        description: "Collect from the most recent Sunday 00:00 to now"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      no_llm:
        description: "Disable OpenAI classification and summarization"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      skip_semantic:
        description: "Skip Semantic Scholar enrichment"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: daily-papers-main
  cancel-in-progress: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  daily-papers:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run tests
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: Generate daily report
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || 'deepseek-v4-flash' }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
        run: |
          DAYS="${{ github.event.inputs.days || '2' }}"
          EXTRA_ARGS=""
          if [ "${{ github.event.inputs.no_llm || 'false' }}" = "true" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --no-llm"
          fi
          if [ "${{ github.event.inputs.skip_semantic || 'false' }}" = "true" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --skip-semantic"
          fi
          if [ "${{ github.event.inputs.since_last_sunday || 'true' }}" = "true" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --since-last-sunday --timezone Asia/Shanghai"
          fi
          if [ -n "$FEISHU_WEBHOOK_URL" ]; then
            echo "Feishu webhook configured; notification will be sent."
            EXTRA_ARGS="$EXTRA_ARGS --notify-feishu"
          else
            echo "::warning::FEISHU_WEBHOOK_URL is not configured; Feishu notification will be skipped."
          fi
          python -m paper_agents run --config config.json --days "$DAYS" $EXTRA_ARGS --json-out latest_papers.json

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add daily_papers/*.md latest_papers.json
          if git diff --cached --quiet; then
            echo "No report changes to commit."
            exit 0
          fi
          git commit -m "chore: update daily paper report"
          git pull --rebase --autostash origin main
          git push origin HEAD:main
