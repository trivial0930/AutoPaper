name: Daily VLA/CV Papers

on:
  schedule:
    # Wednesday 09:00 Asia/Shanghai: collect Monday-Wednesday papers.
    - cron: "0 1 * * 3"
    # Sunday 09:00 Asia/Shanghai: collect Thursday-Sunday papers.
    - cron: "0 1 * * 0"
  workflow_dispatch:
    inputs:
      days:
        description: "Lookback window in days"
        required: false
        default: "2"
      window:
        description: "Date window to collect"
        required: false
        default: "split_week"
        type: choice
        options:
          - "split_week"
          - "last_sunday"
          - "days"
      no_llm:
        description: "Disable OpenAI classification and summarization"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      skip_semantic:
        description: "Skip Semantic Scholar enrichment"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: daily-papers-main
  cancel-in-progress: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  daily-papers:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run tests
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: Generate daily report
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || 'deepseek-v4-flash' }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
        run: |
          DAYS="${{ github.event.inputs.days || '2' }}"
          EXTRA_ARGS=""
          if [ "${{ github.event.inputs.no_llm || 'false' }}" = "true" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --no-llm"
          fi
          if [ "${{ github.event.inputs.skip_semantic || 'false' }}" = "true" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --skip-semantic"
          fi
          WINDOW="${{ github.event.inputs.window || 'split_week' }}"
          case "$WINDOW" in
            split_week)
              EXTRA_ARGS="$EXTRA_ARGS --split-week-window --timezone Asia/Shanghai"
              ;;
            last_sunday)
              EXTRA_ARGS="$EXTRA_ARGS --since-last-sunday --timezone Asia/Shanghai"
              ;;
            days)
              ;;
            *)
              echo "::error::Unsupported window: $WINDOW"
              exit 1
              ;;
          esac
          python -m paper_agents run --config config.json --days "$DAYS" $EXTRA_ARGS --json-out latest_papers.json

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add daily_papers/*.md latest_papers.json
          if git diff --cached --quiet; then
            echo "No report changes to commit."
            exit 0
          fi
          git commit -m "chore: update daily paper report"
          git pull --rebase --autostash origin main
          git push origin HEAD:main

      - name: Send Feishu notification
        continue-on-error: true
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
        run: |
          if [ -z "$FEISHU_WEBHOOK_URL" ]; then
            echo "::warning::FEISHU_WEBHOOK_URL is not configured; Feishu notification skipped."
            exit 0
          fi
          python -m paper_agents notify-feishu --config config.json --json latest_papers.json --timezone Asia/Shanghai
